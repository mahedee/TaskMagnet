# application.properties
# Set the active profile to 'dev'
spring.profiles.active=dev 

# Oracle Database properties (Updated from MySQL)
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.username=taskmagnet
spring.datasource.password=mahedee.net
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/XEPDB1

# JPA/Hibernate Configuration for Oracle (Updated from MySQL)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.Oracle12cDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# App properties (Updated JWT secret)
mahedee.app.jwtSecret=mahedeeSecretKey
mahedee.app.jwtExpirationMs=86400000

# Server Configuration
server.port=8081

# API Documentation
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging Configuration (Optional - for debugging)
logging.level.org.springframework.security=DEBUG
logging.level.com.mahedee=DEBUG
